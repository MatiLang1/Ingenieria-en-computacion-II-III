<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control de Almácigos IoT</title>
    <link rel="stylesheet" href="estilos.css">
    <!-- Fuente Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="dashboard-container">

        <header>
            <h1>🌱 Sistema de Monitoreo de Almácigos</h1>
            <div id="connection-status" style="color: var(--success-color); font-size: 0.9rem;">● En línea</div>
        </header>

        <!-- Grilla de Métricas (valores de los sensores) -->
        <section class="metrics-grid">
            <!-- Sensor de Temperatura -->
            <div class="card">
                <div class="icon">🌡️</div>
                <h3>Temperatura</h3>
                <div class="value"><span id="temp">--</span> <span
                        style="font-size: 1rem; color: var(--text-secondary);">°C</span></div>
            </div>

            <!-- Sensor de Luz -->
            <div class="card">
                <div class="icon">☀️</div>
                <h3>Nivel de Luz</h3>
                <div class="value"><span id="luz">--</span></div>
            </div>

            <!-- Sensor de Nivel -->
            <div class="card">
                <div class="icon">💧</div>
                <h3>Nivel de Líquido</h3>
                <div class="value"><span id="nivel">--</span></div>
            </div>

            <!-- Estado del Sistema -->
            <div class="card">
                <div class="icon">🖥️</div>
                <h3>Estado Sistema</h3>
                <div class="value" id="estado">--</div>
            </div>

            <!-- Buzzer -->
            <div class="card">
                <div class="icon">🔊</div>
                <h3>Estado Buzzer</h3>
                <div class="value" id="buzzer">--</div>
            </div>
        </section>

        <!-- Panel de Control -->
        <section class="control-panel">
            <button onclick="apagarBuzzer()">🔕 Apagar Buzzer</button>
        </section>

        <!-- Historial -->
        <section class="table-container">
            <div class="table-header">
                <h3>Historial de muestras (últimas 500)</h3>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Hora</th>
                            <th>Temperatura (°C)</th>
                            <th>Luz</th>
                            <th>Nivel</th>
                            <th>Estado Sistema</th>
                            <th>Estado Buzzer</th>
                        </tr>
                    </thead>
                    <tbody id="tabla">
                        <!-- Los registros se generan en el JS -->
                    </tbody>
                </table>
            </div>
        </section>

    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <!-- descargamos e importamos la librería MQTT.js de internet, esto para que el navegador entienda el protocolo MQTT y pueda conectarse al broker a traves de WebSockets -->

    <script src="Logica.js"></script>
</body>

</html>
