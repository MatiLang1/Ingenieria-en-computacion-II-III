name: CI Pipeline

# "on" define CUANDO se va a ejecutar este workflow
on:
  push:
    branches: [ "main", "Trabajo-CI-CD-Pipeline" ] # Se ejecuta cuando haces push a estas ramas
  pull_request:
    branches: [ "main", "Trabajo-CI-CD-Pipeline" ] # Se ejecuta cuando alguien hace un PR hacia estas ramas

# "jobs" son los trabajos a realizar. Pueden haber varios corriendo en paralelo
jobs:
  test:
    # "runs-on" dice en qué máquina de GitHub queremos correr nuestro código
    runs-on: ubuntu-latest
    
    # "steps" son los pasos secuenciales que va a hacer la maquinita virtual
    steps:
    - name: 1. Checkout del código
      # Checkout descarga los archivos de tu repo a la máquina virtual
      uses: actions/checkout@v4
      
    - name: 2. Configurar Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: 3. Instalar dependencias
      # Con "run" le decimos correr comandos de terminal (como harías vos en tu PC)
      run: |
        python -m pip install --upgrade pip
        pip install -r publisher_mock/requirements.txt
        
    - name: 4. Correr Linter (Flake8)
      # Flake8 revisa tu código buscando errores de sintaxis y verifica el formato
      run: |
        # Frena la pipeline si hay errores graves (ej: variables no definidas)
        flake8 publisher_mock/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Verifica estilo de código (limite de 150 caracteres para que no sea tan estricto) pero exit-zero significa "si falla esto ultimo no rompas toda la pipeline"
        flake8 publisher_mock/ --count --exit-zero --max-complexity=10 --max-line-length=150 --statistics
        
    - name: 5. Correr Tests Unitarios (Pytest)
      # Acá corre efectivamente el archivo test_publisher.py que creamos antes
      run: |
        cd publisher_mock
        pytest test_publisher.py -v
